services:
  - type: web
    name: factura-validator
    runtime: image
    repo: https://github.com/tu-usuario/factura-validator
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ENVIRONMENT
        value: PROD
      - key: GROQ_API_KEY
        sync: false
      - key: SUNAT_RUC
        sync: false
      - key: SUNAT_USER
        sync: false
      - key: SUNAT_PASS
        sync: false
